services:
  postgres:
    image: postgis/postgis:16-3.4
    platform: linux/amd64
    container_name: trackrock-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: trackrock
      POSTGRES_USER: trackrock
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U trackrock -d trackrock']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    platform: linux/amd64
    container_name: trackrock-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
